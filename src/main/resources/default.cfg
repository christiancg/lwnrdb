# LWNRDB default configuration.
# Lines starting with '#' and blank lines are ignored.
# Values defined here are used as fallbacks when a key is missing from lwnrdb.cfg.
# All of these values are validated at startup; if any value is invalid the
# application logs a FATAL error and refuses to start.

# TCP port the server listens on. Valid number between 1 and 65535.
port=8989

# Maximum number of simultaneous client connections.
# Valid number >= 0. 0 means unlimited connections.
maxConnections=100

# Directory where database files are stored. Must be a writable path.
filePath=db

# Number of background worker threads for index/admin updates. Valid number >= 1.
backgroundProcessingThreads=10

# Directory where log files are stored. Must be a writable path.
logPath=logs

# Maximum number of log files to keep. Valid number >= 1.
maxLogFiles=7

# Maximum size of a single page file. Human-readable (e.g. 2Mb, 512Kb).
# Must be a valid size > 0 and strictly greater than maxEntrySize.
maxPageSize=2Mb

# Maximum size of a single stored document. Human-readable (e.g. 1Mb).
# Must be a valid size > 0 and strictly smaller than maxPageSize.
maxEntrySize=1Mb

# Bootstrap admin credentials. Both are required.
# defaultAdminUsername must be a non-blank string.
defaultAdminUsername=admin
# defaultAdminPassword must be at least 8 characters.
defaultAdminPassword=administrator

# JVM heap-used budget for caching. Human-readable (e.g. 512Mb, 2Gb).
# Special values: 0 = unlimited (no eviction), -1 = caching disabled.
maxMemory=512mb
