# LWNRDB configuration.
# Lines starting with '#' and blank lines are ignored.
# All values are validated at startup; an invalid value logs a FATAL error
# and prevents the application from starting.

# TCP port (1-65535).
port=8989

# Max simultaneous connections. >= 0, where 0 means unlimited.
maxConnections=100

# Database files directory (must be writable).
filePath=db

# Background worker threads (>= 1).
backgroundProcessingThreads=10

# Log files directory (must be writable).
logPath=logs

# Max log files to retain (>= 1).
maxLogFiles=7

# Max page file size (human-readable, > 0, must be greater than maxEntrySize).
maxPageSize=2Mb

# Max document size (human-readable, > 0, must be smaller than maxPageSize).
maxEntrySize=1Mb

# Bootstrap admin credentials (both required; password >= 8 chars).
defaultAdminUsername=admin
defaultAdminPassword=administrator

# Cache budget (human-readable; 0 = unlimited, -1 = disabled).
maxMemory=512mb

# Enable TLS for all connections (true/false). When true, plaintext clients are rejected.
tlsEnabled=false

# PKCS12 keystore path. If missing while tlsEnabled=true, a self-signed dev keystore is generated here.
tlsKeystorePath=certs/lwnrdb.p12

# PKCS12 keystore password (required, non-blank, when tlsEnabled=true).
tlsKeystorePassword=change_it
