name: Sanity Check
on:
  pull_request:
    branches:
      - main
jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
      - name: Run Maven Verify
        run: mvn verify
      - name: Set admin credentials for integration tests
        run: sed -i 's/^defaultAdminPassword=.*/defaultAdminPassword=administrator/' lwnrdb.cfg
      - name: Start server
        run: |
          java -Xmx1g -jar target/lwnrdb-1.0-SNAPSHOT.jar &
          echo $! > server.pid
          until nc -z 127.0.0.1 8989; do sleep 0.2; done
      - name: Run auth integration tests
        run: python3 test_utils/test_auth.py
      - name: Run memory limits tests
        run: python3 test_utils/test_memory_limits.py
      - name: Run extensive memory tests
        env:
          # CI runners are slower than dev hardware; dial the workload down
          # so the run finishes in a couple of minutes. The script still
          # exercises every code path (inserts, indexes, mixed reads, eviction).
          MEM_TEST_COLLECTIONS: "4"
          MEM_TEST_DOCS: "2000"
          MEM_TEST_PAYLOAD_BYTES: "512"
        run: python3 test_utils/test_memory_extensive.py
      - name: Run streaming read path tests
        env:
          # CI runners are slower; dial the workload down so the run stays quick
          # while still spanning multiple pages to exercise the streaming and
          # targeted-fetch read paths.
          STREAM_TEST_DOCS: "2000"
          STREAM_TEST_PAYLOAD_BYTES: "512"
        run: python3 test_utils/test_streaming_reads.py
      - name: Run index-backed aggregation tests (caching disabled)
        env:
          # CI runners are slower; dial the workload down so the run stays quick
          # while still being large enough for the index fast-paths to clearly
          # beat the full-scan paths (JOIN / SORT / DISTINCT).
          INDEX_TEST_DOCS: "2000"
          INDEX_TEST_PAYLOAD_BYTES: "512"
        run: |
          # Index gains are only visible when reads hit disk, so this suite runs
          # against its own server with caching disabled (maxMemory=-1) in an
          # isolated working directory, on the same port 8989. The cache-warmup
          # benchmark later starts its own server from the repo config (caching
          # on), so nothing downstream depends on the shared server staying up.
          #
          # Stop the shared server AND wait for it to release port 8989 before
          # starting ours: pkill is asynchronous, so connecting too early can land
          # on the dying shared server and get reset ("Connection reset by peer").
          pkill -f lwnrdb-1.0-SNAPSHOT.jar || true
          for _ in $(seq 1 50); do nc -z 127.0.0.1 8989 2>/dev/null || break; sleep 0.2; done
          mkdir -p ci-nocache
          sed -e 's/^maxMemory=.*/maxMemory=-1/' \
              -e 's/^defaultAdminPassword=.*/defaultAdminPassword=administrator/' \
              lwnrdb.cfg > ci-nocache/lwnrdb.cfg
          (cd ci-nocache && java -Xmx1g -jar ../target/lwnrdb-1.0-SNAPSHOT.jar > server.log 2>&1 &)
          # Wait until THIS server reports it is listening (not just that the port
          # accepts); fail loudly with its log if it never comes up.
          for _ in $(seq 1 100); do
            grep -q "listening on port 8989" ci-nocache/server.log 2>/dev/null && break
            sleep 0.2
          done
          if ! grep -q "listening on port 8989" ci-nocache/server.log 2>/dev/null; then
            echo "::error::caching-disabled server failed to start"; cat ci-nocache/server.log; exit 1
          fi
          python3 test_utils/test_index_aggregations.py
          pkill -f lwnrdb-1.0-SNAPSHOT.jar || true
      - name: Run TLS integration tests
        # Self-contained: starts its own TLS-enabled server on a dedicated port
        # (9443) and working directory, then stops it — independent of the
        # plaintext server on 8989 used by the other suites.
        run: python3 test_utils/test_tls.py
      - name: Run cache warmup benchmark
        # The benchmark restarts the server itself to measure cold-cache latency,
        # so any tracked server.pid is stale after this step.
        env:
          BENCH_DOCS: "5000"
          BENCH_WARM_RUNS: "10"
        run: python3 test_utils/bench_cache_warmup.py
      - name: Stop server
        if: always()
        run: pkill -f lwnrdb-1.0-SNAPSHOT.jar || true
