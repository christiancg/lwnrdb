name: Sanity Check
on:
  pull_request:
    branches:
      - main

jobs:
  # ---------------------------------------------------------------------------
  # Build once: compile, unit tests, coverage + all quality gates, then publish
  # the shaded jar as an artifact so the integration jobs don't have to rebuild.
  # This is the long pole; everything below runs in parallel against the jar.
  # ---------------------------------------------------------------------------
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Run Maven Verify
        run: mvn verify
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: lwnrdb-jar
          path: target/lwnrdb-1.0-SNAPSHOT.jar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Integration suites, fanned out across independent runners. Each leg gets its
  # own runner VM, so every leg can reuse port 8989 / the default db folder
  # without colliding, and the pgrep-based scripts (memory-extensive, bench) are
  # each the sole jar on their runner. The index suite needs caching disabled
  # (maxMemory=-1); tls and bench manage their own server lifecycle.
  # fail-fast: false so one failing suite doesn't cancel the others.
  # ---------------------------------------------------------------------------
  integration:
    name: ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Lightweight functional suites — share one default-config server.
          - name: auth-api-memory
            start_server: true
            max_memory: 512mb
            xmx: 1g
            run: |
              python3 test_utils/test_auth.py
              python3 test_utils/test_api_commands.py
              python3 test_utils/test_memory_limits.py

          # Streaming / paged read paths.
          - name: streaming
            start_server: true
            max_memory: 512mb
            xmx: 1g
            run: |
              STREAM_TEST_DOCS=2000 \
              STREAM_TEST_PAYLOAD_BYTES=512 \
              python3 test_utils/test_streaming_reads.py

          # Heavy mixed workload that measures RSS via pgrep -> must be sole jar.
          - name: memory-extensive
            start_server: true
            max_memory: 512mb
            xmx: 1g
            run: |
              MEM_TEST_COLLECTIONS=4 \
              MEM_TEST_DOCS=2000 \
              MEM_TEST_PAYLOAD_BYTES=512 \
              python3 test_utils/test_memory_extensive.py

          # Index fast-paths are only visible when reads hit disk -> caching off.
          - name: index-aggregations
            start_server: true
            max_memory: "-1"
            xmx: 512m
            run: |
              INDEX_TEST_DOCS=2000 \
              INDEX_TEST_PAYLOAD_BYTES=512 \
              python3 test_utils/test_index_aggregations.py

          # Self-contained: starts/stops its own TLS server on 9443.
          - name: tls
            start_server: false
            run: |
              python3 test_utils/test_tls.py

          # Restarts the server itself to measure cold-cache latency (pgrep).
          - name: cache-warmup-bench
            start_server: false
            run: |
              BENCH_DOCS=5000 \
              BENCH_WARM_RUNS=10 \
              python3 test_utils/bench_cache_warmup.py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: lwnrdb-jar
          path: target
      - name: Set admin credentials for integration tests
        run: sed -i 's/^defaultAdminPassword=.*/defaultAdminPassword=administrator/' lwnrdb.cfg
      - name: Start server
        if: ${{ matrix.start_server }}
        run: |
          sed -i "s/^maxMemory=.*/maxMemory=${{ matrix.max_memory }}/" lwnrdb.cfg
          java -Xmx${{ matrix.xmx }} -jar target/lwnrdb-1.0-SNAPSHOT.jar > server.log 2>&1 &
          echo $! > server.pid
          for _ in $(seq 1 150); do
            nc -z 127.0.0.1 8989 && break
            sleep 0.2
          done
          if ! nc -z 127.0.0.1 8989; then
            echo "::error::server failed to start"; cat server.log; exit 1
          fi
      - name: Run ${{ matrix.name }} tests
        run: ${{ matrix.run }}
      - name: Stop server
        if: ${{ always() && matrix.start_server }}
        run: pkill -f lwnrdb-1.0-SNAPSHOT.jar || true
