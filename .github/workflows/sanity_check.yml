name: Sanity Check
on:
  pull_request:
    branches:
      - main
jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
      - name: Run Maven Verify
        run: mvn verify
      - name: Set admin credentials for integration tests
        run: sed -i 's/^defaultAdminPassword=.*/defaultAdminPassword=adminstrator/' lwnrdb.cfg
      - name: Start server
        run: |
          java -jar target/lwnrdb-1.0-SNAPSHOT.jar &
          echo $! > server.pid
          until nc -z 127.0.0.1 8989; do sleep 0.2; done
      - name: Run auth integration tests
        run: python3 test_utils/test_auth.py
      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true
